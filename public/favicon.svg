<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title">
  <title>Nayuta Avatar Favicon</title>
  <defs>
    <clipPath id="rounded">
      <rect x="10" y="10" width="108" height="108" rx="22" />
    </clipPath>
    <linearGradient id="warmFrame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8e9db" />
      <stop offset="100%" stop-color="#dca781" />
    </linearGradient>
  </defs>

  <rect width="128" height="128" rx="28" fill="#fbf3ea" />
  <g clip-path="url(#rounded)">
    <rect x="10" y="10" width="108" height="108" fill="#f6eadf" />
    <image
      href="avatar.jpg"
      x="4"
      y="8"
      width="120"
      height="120"
      preserveAspectRatio="xMidYMid slice"
    />
  </g>

  <rect
    x="10"
    y="10"
    width="108"
    height="108"
    rx="22"
    fill="none"
    stroke="url(#warmFrame)"
    stroke-width="2.5"
  />
</svg>
